<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0c"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>

    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4db2ff"/>
      <stop offset="45%" stop-color="#0a84ff"/>
      <stop offset="100%" stop-color="#0060d1"/>
    </linearGradient>

    <linearGradient id="highlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#0a84ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0a84ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded square base (app-icon silhouette) -->
  <rect x="0" y="0" width="64" height="64" rx="16" fill="url(#bg)"/>

  <!-- Ambient blue glow -->
  <rect x="0" y="0" width="64" height="64" rx="16" fill="url(#glow)"/>

  <!-- Soft shadow beneath the mark -->
  <ellipse cx="32" cy="49" rx="14" ry="3" fill="#000000" opacity="0.5"/>

  <!-- Glossy "S" soundwave mark -->
  <path d="M23 20
           C23 16.5 26 14 30.5 14
           C35 14 37.5 16 38 19
           L33.2 20.4
           C32.8 19 31.8 18.2 30.5 18.2
           C28.9 18.2 27.7 19.1 27.7 20.4
           C27.7 21.9 29.1 22.5 31.5 23.2
           C36 24.5 39.5 26.2 39.5 31.2
           C39.5 35.5 36 38.3 31 38.3
           C26.2 38.3 22.9 35.8 22 32.1
           L26.9 30.6
           C27.5 32.6 28.9 34 31 34
           C32.9 34 34.2 33 34.2 31.5
           C34.2 29.9 32.6 29.2 29.8 28.4
           C25.6 27.2 23 25.2 23 20 Z"
        fill="url(#glass)"/>

  <!-- Glass highlight sweep across the top of the mark -->
  <path d="M23 20
           C23 16.5 26 14 30.5 14
           C35 14 37.5 16 38 19
           L33.2 20.4
           C32.8 19 31.8 18.2 30.5 18.2
           C28.9 18.2 27.7 19.1 27.7 20.4
           Z"
